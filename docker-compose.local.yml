services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=testpassword123
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - monitoring

  # Same read-only, locked-down access to Docker as the production version.
  # On Docker Desktop this reads the containers running inside Docker Desktop's VM.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - INFO=1
      - POST=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring

networks:
  monitoring:

volumes:
  n8n_data:
